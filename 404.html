<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 -- Page Not Found | Shady Scanner</title>
  <meta name="description" content="Page not found. Head back to Shady Scanner for AI-powered website security scanning." />
  <style>
    :root {
      --dark: #0A1628;
      --blue: #1D4ED8;
      --cream: #F0F6FF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--cream);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 5rem;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      color: rgba(240,246,255,0.6);
      margin-bottom: 2rem;
      max-width: 480px;
    }
    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.btn-primary {
      padding: 12px 28px;
      background: var(--blue);
      color: var(--cream);
      text-decoration: none;
      font-weight: 700;
      border-radius: 6px;
    }
    a.btn-secondary {
      padding: 12px 28px;
      border: 2px solid var(--blue);
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      border-radius: 6px;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist. But we've got plenty of security scanning resources that do.</p>
  <div class="buttons">
    <a href="/" class="btn-primary">Go Home</a>
    <a href="/blog" class="btn-secondary">Read the Blog</a>
  </div>
</body>
</html>
